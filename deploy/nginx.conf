server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;   # e.g. aria.yourdomain.com

    # Redirect all HTTP to HTTPS (certbot will fill this in automatically,
    # but it's shown here for clarity)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN_HERE;

    # SSL — certbot populates these automatically
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options       DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";

    # Proxy to FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts — LLM responses can take 30-60s
        proxy_read_timeout    300s;
        proxy_connect_timeout  75s;
        proxy_send_timeout    300s;

        # Allow large request bodies (future file uploads etc.)
        client_max_body_size 10M;
    }
}
